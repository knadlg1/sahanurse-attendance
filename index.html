<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사하간호학원 출결시스템</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .card { 
            background: white; 
            padding: 30px 25px;
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 { 
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 600;
        }
        
        .warning-box {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .btn { 
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .kakao-btn { 
            background: #FEE500;
            color: #3c1e1e;
        }
        
        .check-in-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .check-out-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .status-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .status-waiting { background: #e2e8f0; color: #64748b; }
        .status-working { background: #dcfce7; color: #16a34a; }
        .status-completed { background: #fef3c7; color: #d97706; }
        
        .time-display {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }
        
        .time-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .time-label { 
            color: #64748b;
            font-weight: 500;
        }
        
        .time-value { 
            color: #334155;
            font-weight: 600;
        }
        
        .user-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 5px;
        }
        
        .user-hospital {
            font-size: 14px;
            color: #64748b;
        }
        
        .loader {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .location-status {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            color: #0369a1;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .timer-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }
        
        .timer-warning {
            background: #dc2626;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        
        @media (max-width: 380px) {
            .card { padding: 20px; }
            h1 { font-size: 20px; }
            .btn { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="timer-display" id="timer-display">
    ⏱ 남은 시간: <span id="timer-text">10:00</span>
</div>

<div class="container">
    <div class="card">
        <h1>🏥 사하제일간호학원</h1>
        <p class="subtitle">실습 출결 관리 시스템</p>
        
        <div class="warning-box" id="session-expired">
            ⚠️ 세션이 만료되었습니다<br>
            QR코드를 다시 스캔해주세요
        </div>
   
        
        <!-- 로그인 전 화면 -->
        <div id="login-section">
            <button class="btn kakao-btn" id="kakao-login-btn" onclick="loginWithKakao()">
                카카오톡으로 시작하기
            </button>
            <p style="text-align: center; color: #94a3b8; font-size: 12px; margin-top: 10px;">
                ※ 병원 QR코드를 먼저 스캔하셨나요?
            </p>
        </div>
        
        <!-- 로그인 후 화면 -->
        <div id="main-section" style="display: none;">
            <div class="user-info">
                <div class="user-name" id="user-name">-</div>
                <div class="user-hospital" id="user-hospital">-</div>
            </div>
            
            <div class="status-card">
                <div id="status-badge" class="status-badge status-waiting">대기 중</div>
                <div class="time-display" id="time-display" style="display: none;">
                    <div class="time-row" id="check-in-time" style="display: none;">
                        <span class="time-label">출근 시간</span>
                        <span class="time-value" id="check-in-value">-</span>
                    </div>
                    <div class="time-row" id="check-out-time" style="display: none;">
                        <span class="time-label">퇴근 시간</span>
                        <span class="time-value" id="check-out-value">-</span>
                    </div>
                </div>
            </div>
            
            <!-- 처음부터 둘 다 숨기고 비활성화 -->
<button class="btn check-in-btn" id="check-in-btn" onclick="doCheckIn()" style="display: none;" disabled>
    출근하기
</button>
<button class="btn check-out-btn" id="check-out-btn" onclick="doCheckOut()" style="display: none;" disabled>
    퇴근하기
</button>
        </div>
        
        <div class="loader" id="loader"></div>
        <div class="location-status" id="location-status"></div>
        <div class="error-message" id="error-message"></div>
    </div>
</div>

<script>
    // ==================== 설정 ====================
    const CONFIG = {
        KAKAO_KEY: '256604f2f245388033b0226667539d5f',
        GAS_URL: 'https://script.google.com/macros/s/AKfycbxJlIf-UjCjyDYjoNjBCWZdu7FH36XlSKRlGAaPwzoFrFqAjDpAWeipxGVLm2mXLUXaNQ/exec',
        SESSION_DURATION: 10 * 60 * 1000, // 10분
        MAX_DISTANCE: 300, // 미터
        GPS_TIMEOUT: 20000, // 20초
        GPS_MAX_AGE: 0
    };
    
    // ==================== 전역 변수 ====================
    let currentUser = {
        kakaoId: null,
        name: null,
        hospital: null,
        hospitalLat: null,
        hospitalLon: null
    };
    
    let sessionTimer = null;
    let remainingTime = CONFIG.SESSION_DURATION;
    
    // ==================== 초기화 ====================
    Kakao.init(CONFIG.KAKAO_KEY);
    
    // window.onload 함수 수정
window.onload = async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    if (code) {
        // 카카오에서 돌아온 경우
        showLoader(true);
        
        try {
            // 🔥 Apps Script로 실제 카카오 ID 받기
            const response = await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'getKakaoUser',
                    code: code,
                    redirect_uri: 'https://knadlg1.github.io/sahanurse-attendance/'
                })
            });
            
            const result = await response.json();
            
            if (result.kakaoId) {
                // 🔥 실제 카카오 ID 받음!
                console.log('실제 카카오 ID:', result.kakaoId);
                
                currentUser.kakaoId = result.kakaoId; // 이제 항상 같은 ID
                sessionStorage.setItem('kakaoLoginComplete', 'true');
                sessionStorage.setItem('currentKakaoId', result.kakaoId);
                
                // localStorage에도 저장 (영구 보관)
                localStorage.setItem('realKakaoId', result.kakaoId);
                
                // URL 정리
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // 학생 확인
                await verifyStudent();
                
            } else {
                // 실패시 기존 방식 사용
                handleSimpleKakaoLogin(code);
            }
            
        } catch(e) {
            console.error('카카오 ID 받기 실패:', e);
            handleSimpleKakaoLogin(code);
        }
        
    } else {
        // 일반 접속 - 기존 코드
        initializeSession();
        checkMidnightReset();
        preventBackButton();
        
        // 저장된 카카오 ID 확인
        const savedKakaoId = localStorage.getItem('realKakaoId');
        if (savedKakaoId) {
            currentUser.kakaoId = savedKakaoId;
            const savedUser = sessionStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainSection();
                checkTodayStatus();
            } else {
                await verifyStudent();
            }
        }
    }
};
// 간단한 카카오 로그인 처리
function handleSimpleKakaoLogin(code) {
    // 🔥 localStorage에서 고정 ID 가져오기
    let kakaoId = localStorage.getItem('myKakaoId');
    
    if (!kakaoId) {
        // 없으면 생성 (한 번만)
        kakaoId = 'USER_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('myKakaoId', kakaoId);
    }
    
    currentUser.kakaoId = kakaoId;
    sessionStorage.setItem('kakaoLoginComplete', 'true');
    sessionStorage.setItem('currentKakaoId', kakaoId);
    
    window.history.replaceState({}, document.title, window.location.pathname);
    
    initializeSession();
    verifyStudent();
}
    
    // ==================== 세션 관리 ====================
    function initializeSession() {
        const qrScanTime = sessionStorage.getItem('qrScanTime');
        const now = Date.now();
        
        if (!qrScanTime) {
            // 처음 접속 - QR 스캔으로 간주
            sessionStorage.setItem('qrScanTime', now.toString());
            startSessionTimer();
            enableUI();
        } else {
            // 재접속 - 시간 체크
            const elapsed = now - parseInt(qrScanTime);
            if (elapsed < CONFIG.SESSION_DURATION) {
                // 아직 유효함
                remainingTime = CONFIG.SESSION_DURATION - elapsed;
                startSessionTimer();
                enableUI();
                
                // 이미 로그인했었는지 확인
                const savedUser = sessionStorage.getItem('currentUser');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    showMainSection();
                    checkTodayStatus();
                }
            } else {
                // 만료됨
                expireSession();
            }
        }
    }
    
    function startSessionTimer() {
        document.getElementById('timer-display').style.display = 'block';
        updateTimerDisplay();
        
        sessionTimer = setInterval(() => {
            remainingTime -= 1000;
            updateTimerDisplay();
            
            if (remainingTime <= 0) {
                expireSession();
            } else if (remainingTime <= 60000) { // 1분 남음
                document.getElementById('timer-display').classList.add('timer-warning');
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const minutes = Math.floor(remainingTime / 60000);
        const seconds = Math.floor((remainingTime % 60000) / 1000);
        document.getElementById('timer-text').textContent = 
            `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function expireSession() {
    clearInterval(sessionTimer);
    sessionStorage.clear();
    
    document.getElementById('session-expired').style.display = 'block';
    document.getElementById('kakao-login-btn').disabled = true;
    document.getElementById('kakao-login-btn').textContent = 'QR 재스캔 필요';
    document.getElementById('timer-display').style.display = 'none';
    
    // 🔥 모든 버튼 비활성화 + 숨기기
    document.getElementById('check-in-btn').style.display = 'none';
    document.getElementById('check-in-btn').disabled = true;
    document.getElementById('check-out-btn').style.display = 'none';
    document.getElementById('check-out-btn').disabled = true;
}
    
    function enableUI() {
        document.getElementById('kakao-login-btn').disabled = false;
    }
    
    function disableAllButtons() {
        document.getElementById('check-in-btn').disabled = true;
        document.getElementById('check-out-btn').disabled = true;
    }
    
    // ==================== 자정 리셋 ====================
    function checkMidnightReset() {
        const checkTime = () => {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0) {
                const lastReset = localStorage.getItem('lastResetDate');
                const today = now.toDateString();
                
                if (lastReset !== today) {
                    localStorage.setItem('lastResetDate', today);
                    sessionStorage.clear();
                    alert('새로운 날이 시작되었습니다. 출결 정보가 초기화됩니다.');
                    location.reload();
                }
            }
        };
        
        checkTime();
        setInterval(checkTime, 60000); // 1분마다 체크
    }
    
    // ==================== 카카오 로그인 ====================
  function loginWithKakao() {
    if (remainingTime <= 0) {
        alert('세션이 만료되었습니다. QR을 다시 스캔해주세요.');
        return;
    }
    
    sessionStorage.setItem('kakaoLoginAttempt', 'true');
    
    const REST_API_KEY = 'ca34b3c2a0cf2d0fe87d9f18b39aa8d8';
    const REDIRECT_URI = 'https://knadlg1.github.io/sahanurse-attendance/';
    
    const kakaoURL = `https://kauth.kakao.com/oauth/authorize?client_id=${REST_API_KEY}&redirect_uri=${REDIRECT_URI}&response_type=code`;
    
    // iframe 탈출 시도
    try {
        // 최상위 창으로 이동 (Wix 밖으로)
        if (window.top !== window.self) {
            window.top.location.href = kakaoURL;
        } else {
            window.location.href = kakaoURL;
        }
    } catch(e) {
        // 보안 정책으로 막히면 버튼 표시
        showDirectButton(kakaoURL);
    }
}

function showDirectButton(url) {
    document.getElementById('login-section').innerHTML = `
        <div style="padding: 20px; background: #FEE500; border-radius: 12px;">
            <h3>카카오 로그인이 필요합니다</h3>
            <button 
                onclick="forceRedirect('${url}')"
                style="
                    background: white;
                    color: #3C1E1E;
                    padding: 15px 30px;
                    border: none;
                    border-radius: 8px;
                    font-size: 16px;
                    font-weight: bold;
                    cursor: pointer;
                    margin-top: 10px;
                "
            >
                👉 여기를 클릭해서 로그인
            </button>
        </div>
    `;
}

function forceRedirect(url) {
    // 모든 방법 동시 시도
    window.open(url, '_top');
    window.top.location = url;
    parent.location = url;
    document.location = url;
}
  
    // ==================== 학생 확인 ====================
    async function verifyStudent() {
    try {
        const deviceId = generateDeviceId();
        
        // 🔥 로딩 메시지 표시
        showLoader(true);
        
        const response = await fetchWithRetry(CONFIG.GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'checkStudent',
                kakaoId: currentUser.kakaoId,
                deviceId: deviceId
            })
        });
        
        const result = await response.json();
        
        console.log('학생 확인 결과:', result); // 디버깅용
        
        if (result.status === 'found') {
            // 등록된 학생
            currentUser.name = result.name;
            currentUser.hospital = result.hospital;
            currentUser.hospitalLat = result.hospitalLat;
            currentUser.hospitalLon = result.hospitalLon;
            
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
            showLoader(false);
            showMainSection();
            checkTodayStatus();
            
        } else if (result.status === 'not_found') {
            // 미등록 학생
            showLoader(false);
            await registerNewStudent(deviceId);
            
        } else if (result.status === 'device_mismatch') {
            showLoader(false);
            alert('등록된 기기가 아닙니다. 본인 휴대폰으로 접속해주세요.');
            
        } else {
            showLoader(false);
            console.error('알 수 없는 상태:', result);
            await registerNewStudent(deviceId);
        }
        
    } catch (error) {
        console.error('학생 확인 오류:', error);
        showLoader(false);
        showError('서버 연결 실패. 다시 시도해주세요.');
    }
}
    
    // ==================== 신규 학생 등록 ====================
    async function registerNewStudent(deviceId) {
    showLoader(false);
    
    // 🔥 이미 등록된 정보가 있는지 먼저 확인
    const savedUser = localStorage.getItem('registeredUser');
    if (savedUser) {
        const userData = JSON.parse(savedUser);
        const useExisting = confirm(`이미 등록된 정보가 있습니다.\n이름: ${userData.name}\n전화번호: ${userData.phone}\n\n이 정보를 사용하시겠습니까?`);
        
        if (useExisting) {
            // 기존 정보 사용
            showLoader(true);
            const response = await fetchWithRetry(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'registerStudent',
                    kakaoId: currentUser.kakaoId,
                    deviceId: deviceId,
                    name: userData.name,
                    phone: userData.phone
                })
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                currentUser.name = result.name;
                currentUser.hospital = result.hospital;
                currentUser.hospitalLat = result.hospitalLat;
                currentUser.hospitalLon = result.hospitalLon;
                
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                showLoader(false);
                showMainSection();
                checkTodayStatus();
                return;
            }
        }
    }
    
    // 새로 입력
    const name = prompt('이름을 입력하세요');
    if (!name) {
        location.reload();
        return;
    }
    
    const phone = prompt('전화번호를 입력하세요\n(예:010-1234-5678)');
    if (!phone) {
        location.reload();
        return;
    }
    
    // 🔥 입력한 정보 저장
    localStorage.setItem('registeredUser', JSON.stringify({name, phone}));
    
    showLoader(true);
    
    try {
        const response = await fetchWithRetry(CONFIG.GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'registerStudent',
                kakaoId: currentUser.kakaoId,
                deviceId: deviceId,
                name: name,
                phone: phone
            })
        });
        
        const result = await response.json();
        
        console.log('등록 결과:', result); // 디버깅용
        
        if (result.status === 'success') {
            currentUser.name = result.name;
            currentUser.hospital = result.hospital;
            currentUser.hospitalLat = result.hospitalLat || 37.5665;  // 기본값
            currentUser.hospitalLon = result.hospitalLon || 126.9780; // 기본값
            
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            alert(`✅ ${currentUser.name}님 등록 완료!\n실습병원: ${currentUser.hospital}`);
            
            showLoader(false);
            showMainSection();
            
            // 🔥 checkTodayStatus를 약간 지연시켜 실행
            setTimeout(() => {
                checkTodayStatus();
            }, 500);
            
        } else {
            showLoader(false);
            alert('❌ 등록 실패\n\n가능한 원인:\n1. 이름/전화번호가 명단과 일치하지 않음\n2. 이미 다른 기기에 등록됨\n\n학원에 문의하세요.');
            
            // 저장된 정보 삭제
            localStorage.removeItem('registeredUser');
        }
        
    } catch (error) {
        console.error('등록 오류:', error);
        showLoader(false);
        alert('서버 오류가 발생했습니다.\n잠시 후 다시 시도해주세요.');
    }
}

            // 퇴근 버튼은 비활성화 + 숨기기
            document.getElementById('check-out-btn').style.display = 'none';

    } catch (error) {

        document.getElementById('check-out-btn').disabled = true;
    }

    // ==================== 출근 처리 ====================
    async function doCheckIn() {
        await processAttendance('출근');
    }
    
    // ==================== 퇴근 처리 ====================
    async function doCheckOut() {
        await processAttendance('퇴근');
    }
    
    // ==================== 출결 처리 공통 ====================
    async function processAttendance(type) {
    if (remainingTime <= 0) {
        alert('세션이 만료되었습니다. QR을 다시 스캔해주세요.');
        return;
    }
    
    document.getElementById(`check-${type === '출근' ? 'in' : 'out'}-btn`).disabled = true;
    document.getElementById('location-status').style.display = 'block';
    document.getElementById('location-status').innerHTML = 
        '📍 위치 확인 중...<br><small>GPS 권한을 허용해주세요</small>';
    
    try {
        const position = await getCurrentPosition();
        const distance = calculateDistance(
            position.coords.latitude,
            position.coords.longitude,
            currentUser.hospitalLat,
            currentUser.hospitalLon
        );
        
        // 🔥 위치 정보 한 줄로 표시
        document.getElementById('location-status').innerHTML = 
            `📍 위치확인: ✅ 승인 | 거리: ${Math.round(distance)}m | GPS정확도: ${Math.round(position.coords.accuracy)}m`;
        
        const maxAllowedDistance = CONFIG.MAX_DISTANCE + Math.min(position.coords.accuracy, 50);
        
        if (distance <= maxAllowedDistance) {
            // 위치 확인 성공
            document.getElementById('location-status').innerHTML = 
                `✅ 위치 인증 성공! ${type} 처리 중...`;
            
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const response = await fetchWithRetry(CONFIG.GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'recordAttendance',
                    type: type,
                    kakaoId: currentUser.kakaoId,
                    name: currentUser.name,
                    hospital: currentUser.hospital,
                    time: timeString,
                    accuracy: Math.round(position.coords.accuracy),
                    distance: Math.round(distance)
                })
            });
            
            const result = await response.json();
            
            if (result.status === 'success') {
                // 🔥 성공 메시지와 시간 표시
                document.getElementById('location-status').innerHTML = 
                    `✅ ${type} 완료! | 시간: ${timeString} | 위치: 승인됨`;
                
                // 🔥 바로 화면에 시간 업데이트 (새로고침 전에)
                if (type === '출근') {
                    document.getElementById('check-in-value').textContent = timeString;
                    document.getElementById('check-in-time').style.display = 'block';
                    document.getElementById('time-display').style.display = 'block';
                    
                    // 출근 버튼 숨기고 퇴근 버튼 표시
                    document.getElementById('check-in-btn').style.display = 'none';
                    document.getElementById('check-out-btn').style.display = 'block';
                    document.getElementById('check-out-btn').disabled = false;
                    
                    updateStatus('working');
                } else {
                    document.getElementById('check-out-value').textContent = timeString;
                    document.getElementById('check-out-time').style.display = 'block';
                    
                    // 퇴근 버튼도 숨기기
                    document.getElementById('check-out-btn').style.display = 'none';
                    
                    updateStatus('completed');
                }
                
                // 3초 후 새로고침
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            } else {
                throw new Error(result.message);
            }
            
        } else {
            // 🔥 위치 확인 실패 - 한 줄로
            document.getElementById('location-status').innerHTML = 
                `❌ 위치 인증 실패 | 거리: ${Math.round(distance)}m (허용: ${Math.round(maxAllowedDistance)}m)`;
            
            alert(`⚠️ 병원 내에서 다시 시도해주세요.`);
            
            setTimeout(() => {
                document.getElementById('location-status').style.display = 'none';
            }, 5000);
            
            document.getElementById(`check-${type === '출근' ? 'in' : 'out'}-btn`).disabled = false;
        }
        
    } catch (error) {
        document.getElementById('location-status').innerHTML = 
            '❌ GPS 오류 - 위치 서비스를 켜주세요';
        
        setTimeout(() => {
            document.getElementById('location-status').style.display = 'none';
        }, 5000);
        
        document.getElementById(`check-${type === '출근' ? 'in' : 'out'}-btn`).disabled = false;
        
        if (error.code === 1) {
            alert('📍 위치 권한을 허용해주세요');
        } else if (error.code === 2) {
            alert('📍 GPS를 켜주세요');
        } else if (error.code === 3) {
            alert('📍 실외나 창가로 이동해주세요');
        }
    }
}
    
    // ==================== 위치 관련 함수 ====================
    async function getCurrentPosition() {
    // 먼저 권한 체크
    if (!navigator.geolocation) {
        throw new Error('GPS를 지원하지 않는 브라우저입니다');
    }
    
    return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
            resolve,
            reject,
            {
                enableHighAccuracy: true,
                timeout: 30000,  // 30초로 늘림
                maximumAge: 0
            }
        );
    });
}
    
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // 지구 반경 (미터)
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        return R * c;
    }

        switch(status) {

    }

            document.getElementById('error-message').textContent = '';

    // ==================== 유틸리티 함수 ====================
    function generateDeviceId() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('device', 2, 2);
        
        const deviceInfo = {
            userAgent: navigator.userAgent,
            screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            language: navigator.language,
            platform: navigator.platform || 'unknown',
            canvas: canvas.toDataURL().substring(0, 50)
        };
        
        return btoa(JSON.stringify(deviceInfo));
    }
    
    async function fetchWithRetry(url, options, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (response.ok) return response;
            } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
            }
        }
    }
    
    function preventBackButton() {
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.go(1);
        };
    }
